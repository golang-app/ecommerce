services:
  backend:
    build:
      context: ./backend
      target: web
    restart: unless-stopped
    depends_on:
      - migrate
      - mailhog
      - otel-collector
    ports:
      - 8080:8080
    networks:
      - ecommerce
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      UPLOADS_DIR: /uploads
      # MailHog is the dev SMTP catch-all (see the mailhog service below).
      # The web UI at http://localhost:8025 shows every email the app
      # sends — far easier than tailing logs for the LogMailer fallback.
      SMTP_HOST: mailhog:1025
      MAIL_FROM: no-reply@gocommerce.local
      BASE_URL: http://localhost:8080
      # Stock reservation TTL: orders still pending after this duration are
      # marked failed by the background sweeper and their reserved stock is
      # released. Defaults: 30m / 5m. Override here for dev/testing.
      RESERVATION_TTL: ${RESERVATION_TTL:-30m}
      RESERVATION_SWEEP_INTERVAL: ${RESERVATION_SWEEP_INTERVAL:-5m}
      # Transactional Outbox dispatcher poll cadence. The dispatcher
      # drains unsent integration events from outbox_event and
      # republishes them onto the in-process bus. Lower values cut
      # publish lag at the cost of more idle SELECTs; the default keeps
      # lag sub-second under normal load.
      OUTBOX_INTERVAL: ${OUTBOX_INTERVAL:-1s}
      # Tax rate (percent, e.g. 8.875 for 8.875%) and the free-shipping
      # threshold in MINOR units (cents). Both default to zero (disabled).
      TAX_RATE_PERCENT: ${TAX_RATE_PERCENT:-0}
      FREE_SHIPPING_THRESHOLD: ${FREE_SHIPPING_THRESHOLD:-0}
      # Display-only multi-currency. The picker in the header is shown only
      # when SUPPORTED_CURRENCIES has more than one entry. FX_RATES are
      # operator-configured (NOT a live feed).
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      SUPPORTED_CURRENCIES: ${SUPPORTED_CURRENCIES:-USD}
      FX_RATES: ${FX_RATES:-}
      # OpenTelemetry: ship traces / metrics / logs to the local collector.
      # Empty / unset values disable each exporter — observability.Init*
      # functions detect this and skip exporter setup so the app still
      # starts when the collector is down (the batcher tolerates it
      # transparently either way).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    volumes:
      # User-uploaded admin images are persisted on the host. The Dockerfile
      # creates /uploads owned by the app user (uid 10001).
      - ./data/uploads:/uploads
  mailhog:
    # MailHog is a single-binary SMTP sink with a built-in web inbox. It
    # listens for SMTP on :1025 and exposes the captured messages over a
    # browser UI on :8025 — exactly the right shape for local dev: the app
    # sends real SMTP, MailHog catches it, no email ever leaves the host.
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - ecommerce
  postgres:
    image: postgres
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    networks:
      - ecommerce
  migrate:
    image: migrate/migrate
    restart: on-failure
    depends_on:
      - postgres
    volumes:
      - ./migrations:/migrations
    networks:
      - ecommerce
    command: ["-path", "/migrations", "-database",  "postgres://postgres:postgres@postgres:5432/ecommerce?sslmode=disable", "up"]
  seeds:
    build:
      context: ./backend
      target: cli
    depends_on:
      - migrate
    networks:
      - ecommerce
    command: seeds
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres

  # ----- Observability stack ------------------------------------------------
  #
  # The four services below form the dev telemetry pipeline:
  #
  #   backend --OTLP/HTTP:4318-->  otel-collector  ---->  jaeger   (traces)
  #                                                 |--> prometheus (metrics)
  #                                                 \--> stdout    (logs)
  #
  # Images pinned to recent stable tags; bump deliberately. `:latest` is
  # avoided so a rebuild on a different day does not silently swap binaries.

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deploy/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      # Exposed to the host for ad-hoc otlp probes via curl/grpcurl. The
      # backend talks to the collector over the docker network, not the
      # host-bound port.
      - 14317:4317  # OTLP/gRPC (remapped to dodge other dev stacks)
      - 14318:4318  # OTLP/HTTP
      - 18889:8889  # Prometheus scrape target
    depends_on:
      - jaeger
    networks:
      - ecommerce

  jaeger:
    # all-in-one bundles collector + query + UI in a single binary; perfect
    # for dev. 16686 is the UI and the query API Grafana hits. 4317 is its
    # own OTLP/gRPC receiver — that's the port the collector forwards to.
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - 16686:16686  # Jaeger UI
    networks:
      - ecommerce

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - 19090:9090
    networks:
      - ecommerce

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      # Anonymous viewer access keeps the dev UX frictionless. No real data
      # ever lives in this Grafana instance.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - 13000:3000
    depends_on:
      - prometheus
      - jaeger
    networks:
      - ecommerce

networks:
  ecommerce:
    driver: bridge

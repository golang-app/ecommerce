# Minimal Prometheus config for the local dev stack.
#
# The only scrape target is the OpenTelemetry Collector's `prometheus`
# exporter (see deploy/otel-collector-config.yaml) — that's how OTLP
# metrics from the backend reach Prometheus.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
